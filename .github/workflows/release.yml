# Staged release workflow (Release Please pilot) — promoted via
# tabnas/admin rollout/apply-ci-folders.sh.
#
# ts/ releases tag vX.Y.Z and publish @tabnas/parser to npm via Trusted
# Publishing (OIDC) — configure the trusted publisher once at
# npmjs.com > @tabnas/parser > Settings > Trusted publisher
# (repo: tabnas/parser, workflow: release.yml) before the first release.
# go/ releases tag go/vX.Y.Z; the Go module proxy picks tags up directly.
#
# TODO(pilot): wire the go Version const bump via release-please
# extra-files generic updater annotations.

name: release

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      ts_release: ${{ steps.rp.outputs['ts--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-npm:
    needs: release-please
    if: needs.release-please.outputs.ts_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Publish @tabnas/parser (OIDC trusted publishing)
        working-directory: ts
        run: |
          npm install -g npm@latest
          npm i
          npm run build --if-present
          npm publish --access public
