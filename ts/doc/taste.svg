<svg xmlns="http://www.w3.org/2000/svg" class="railroad" width="287" height="226" viewBox="0 0 287 226"><style>svg.railroad{background:#fff;font-family:monospace;font-size:13px}.rr-line{stroke:#334;stroke-width:2;fill:none}.rr-cap{fill:#334}.rr-term{fill:#e8f0ff;stroke:#334;stroke-width:2}.rr-nonterm{fill:#fff7e8;stroke:#334;stroke-width:2}.rr-label{fill:#111;text-anchor:middle;dominant-baseline:middle}.rr-comment{fill:#666;font-style:italic;text-anchor:middle;dominant-baseline:middle}.rr-title{fill:#113;font-weight:bold;font-size:15px}.rr-legend{fill:#333;font-size:12px}.rr-legend-tok{fill:#113;font-weight:bold}a:hover .rr-nonterm{fill:#ffe6b3;cursor:pointer}</style><g><g id="val"><text class="rr-title" x="16" y="31">val</text><circle class="rr-cap" cx="46" cy="42" r="3"/><path class="rr-line" d="M46 42V56"/><rect class="rr-term" x="16" y="56" width="60" height="26" rx="13" ry="13"/><text class="rr-label" x="46" y="69">hello</text><path class="rr-line" d="M46 82V96"/><circle class="rr-cap" cx="46" cy="96" r="3"/></g><text class="rr-title" x="16" y="145">Ignored tokens</text><text class="rr-legend" x="16" y="167"><tspan class="rr-legend-tok">CM</tspan>  —  comment</text><text class="rr-legend" x="16" y="185"><tspan class="rr-legend-tok">LN</tspan>  —  newline (line break)</text><text class="rr-legend" x="16" y="203"><tspan class="rr-legend-tok">SP</tspan>  —  whitespace (spaces or tabs)</text></g></svg>